name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pruebas:
    name: Lint y pruebas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: uv sync --frozen

      - name: Ejecutar pruebas (pytest)
        run: uv run pytest

  build-imagen:
    name: Construir imagen Docker
    runs-on: ubuntu-latest
    needs: pruebas
    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen
        run: docker build -t cic-api:${{ github.sha }} .
