name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pruebas:
    name: Lint y pruebas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      - name: Verificar estilo (ruff)
        run: ruff check .

      - name: Ejecutar pruebas (pytest)
        run: pytest

  build-imagen:
    name: Construir imagen Docker
    runs-on: ubuntu-latest
    needs: pruebas
    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen
        run: docker build -t cic-api:${{ github.sha }} .
